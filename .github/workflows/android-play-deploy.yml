name: Build and Deploy Android to Play Console

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-play-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_android:
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: "17"
      FLUTTER_VERSION: "3.22.3"
      PACKAGE_NAME: "com.openedheavens.sundayschool"
      PLAY_TRACK: "internal"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android signing files
        shell: bash
        run: |
          printf '%s' "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Read Flutter version name
        id: version_name
        shell: bash
        run: |
          VERSION_LINE="$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}')"
          VERSION_NAME="${VERSION_LINE%%+*}"
          echo "value=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Compute Android build number
        id: build_number
        shell: bash
        run: |
          echo "value=$((1000 + (${{ github.run_number }} * 10) + ${{ github.run_attempt }}))" >> "$GITHUB_OUTPUT"

      - name: Build Android App Bundle
        run: |
          flutter build appbundle --release \
            --build-name "${{ steps.version_name.outputs.value }}" \
            --build-number "${{ steps.build_number.outputs.value }}"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Package native debug symbols
        id: debug_symbols
        shell: bash
        run: |
          set -euo pipefail

          symbols_dir="$(find build/app -type d \( -path '*/merged_native_libs/*/out/lib' -o -path '*/stripped_native_libs/*/out/lib' \) | head -n 1 || true)"

          if [ -z "$symbols_dir" ]; then
            echo "zip_path=" >> "$GITHUB_OUTPUT"
            echo "No native debug symbols directory found; continuing without symbol upload."
            exit 0
          fi

          mkdir -p build/app/outputs
          zip_path="$GITHUB_WORKSPACE/build/app/outputs/native-debug-symbols.zip"

          rm -f "$zip_path"
          (
            cd "$symbols_dir"
            zip -r "$zip_path" .
          )

          echo "zip_path=build/app/outputs/native-debug-symbols.zip" >> "$GITHUB_OUTPUT"

      - name: Upload native debug symbols artifact
        if: ${{ steps.debug_symbols.outputs.zip_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-native-debug-symbols
          path: ${{ steps.debug_symbols.outputs.zip_path }}

      - name: Upload to Play Console with native debug symbols
        if: ${{ steps.debug_symbols.outputs.zip_path != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          debugSymbols: ${{ steps.debug_symbols.outputs.zip_path }}
          whatsNewDirectory: distribution/whatsnew
          track: ${{ env.PLAY_TRACK }}
          releaseName: FaithFoundation ${{ steps.version_name.outputs.value }} (${{ steps.build_number.outputs.value }})
          status: completed

      - name: Upload to Play Console
        if: ${{ steps.debug_symbols.outputs.zip_path == '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          whatsNewDirectory: distribution/whatsnew
          track: ${{ env.PLAY_TRACK }}
          releaseName: FaithFoundation ${{ steps.version_name.outputs.value }} (${{ steps.build_number.outputs.value }})
          status: completed

name: Build and Deploy Android to Play Console

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-play-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_android:
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: "17"
      FLUTTER_VERSION: "3.22.3"
      PACKAGE_NAME: "com.openedheavens.sundayschool"
      PLAY_TRACK: "internal"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android signing files
        shell: bash
        run: |
          printf '%s' "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Read Flutter version name
        id: version_name
        shell: bash
        run: |
          VERSION_LINE="$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}')"
          VERSION_NAME="${VERSION_LINE%%+*}"
          echo "value=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Compute Android build number
        id: build_number
        shell: bash
        run: |
          echo "value=$((1000 + ${{ github.run_number }}))" >> "$GITHUB_OUTPUT"

      - name: Build Android App Bundle
        run: |
          flutter build appbundle --release \
            --build-name "${{ steps.version_name.outputs.value }}" \
            --build-number "${{ steps.build_number.outputs.value }}"

      - name: Upload bundle to Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ env.PLAY_TRACK }}
          releaseName: FaithFoundation ${{ steps.version_name.outputs.value }} (${{ steps.build_number.outputs.value }})
          status: completed
